# AeroSpace tries to find the custom config in two locations:
# ~/.aerospace.toml
# ${XDG_CONFIG_HOME}/aerospace/aerospace.toml
# (environment variable XDG_CONFIG_HOME fallbacks to ~/.config if the variable
# is not presented)

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
# Run SketchyBar and JankyBorders together with AeroSpace.
after-startup-command = [
	'exec-and-forget sketchybar',
	'exec-and-forget borders'
]

# Start AeroSpace at login
start-at-login = true

# Normalizations.
# See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Set to 0 to disable the padding feature
# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
accordion-padding = 48

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# exec-on-workspace-change callback allows to run arbitrary process when focused
# workspace changes. It may be useful for integrating with bars.
# Besides the exec.env-vars, the process has access to the following environment variables:
# AEROSPACE_FOCUSED_WORKSPACE - the workspace user switched to
# AEROSPACE_PREV_WORKSPACE - the workspace user switched from
# Notify Sketchybar about workspace change
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = true

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
outer.top =     [
  # offset of 32 on internal display, because of notch (16" MPB)
  { monitor.'built-in.*' = 16 },
  48
]
outer.right =      24
outer.bottom =     24
outer.left =       24
inner.horizontal = 24
inner.vertical =   24

# Assign certain workspaces to
# See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[workspace-to-monitor-force-assignment]
7 = 'secondary'
8 = 'secondary'
9 = 'secondary'

# Float CleanShot X windows by default
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
if.app-id = 'pl.maketheweb.cleanshotx'
check-further-callbacks = true
run = 'layout floating'

# Float Screen Studio windows by default
# See: https://nikitabobko.github.io/AeroSpace/guide#on-window-detected-callback
[[on-window-detected]]
if.app-id = 'com.timpler.screenstudio'
check-further-callbacks = true
run = 'layout floating'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# Open/focus apps using keybinds
# See: https://nikitabobko.github.io/AeroSpace/commands#exec-and-forget
#hyper-b = 'exec-and-forget open -a "Brave Browser.app"'
#hyper-d = 'exec-and-forget open -a "IntelliJ IDEA Ultimate.app"'
#hyper-t = 'exec-and-forget open -a "WezTerm.app"'
#hyper-a = 'exec-and-forget open -a "Ghostty.app"'
#hyper-z = 'exec-and-forget open -a "Obsidian.app"'
#hyper-r = 'exec-and-forget open -a "Windows App"'
#hyper-c = 'exec-and-forget open -a "Slack.app"'
#hyper-w = 'exec-and-forget open -a "Microsoft Teams.app"'
#hyper-s = 'exec-and-forget open -a "Spotify.app"'
#hyper-h = 'exec-and-forget open -a "Claude.app"'

# Switch between layouts
# See: https://nikitabobko.github.io/AeroSpace/commands#layout
hyper-v = 'layout tiles horizontal vertical'
hyper-g = 'layout accordion horizontal vertical'

# Toggle windows in and out of the tiling layout/floating
# See: https://nikitabobko.github.io/AeroSpace/commands#layout
hyper-f = 'layout floating tiling'

# Make windows fullscreen
# See: https://nikitabobko.github.io/AeroSpace/commands#fullscreen
hyper-m = 'fullscreen'
hyper-k = 'fullscreen --no-outer-gaps'
hyper-enter = 'macos-native-fullscreen'

# Switch window focus
# See: https://nikitabobko.github.io/AeroSpace/commands#focus
hyper-left = 'focus left'
hyper-down = 'focus down'
hyper-up = 'focus up'
hyper-right = 'focus right'

# Move windows in the given direction
# See: https://nikitabobko.github.io/AeroSpace/commands#move
hyper-space-left = 'move left'
hyper-space-down = 'move down'
hyper-space-up = 'move up'
hyper-space-right = 'move right'

# Switch display focus
# See: https://nikitabobko.github.io/AeroSpace/commands#focus-monitor
hyper-h = 'focus-monitor left'
hyper-j = 'focus-monitor down'
hyper-k = 'focus-monitor up'
hyper-l = 'focus-monitor right'

# Switch workspaces
# See: https://nikitabobko.github.io/AeroSpace/commands#workspace
hyper-1 = 'workspace 1'
hyper-2 = 'workspace 2'
hyper-3 = 'workspace 3'
hyper-4 = 'workspace 4'
hyper-5 = 'workspace 5'
hyper-6 = 'workspace 6'
hyper-7 = 'workspace 7'
hyper-8 = 'workspace 8'
hyper-9 = 'workspace 9'

# Move windows/nodes to other workspaces
# See: https://nikitabobko.github.io/AeroSpace/commands#move-node-to-workspace
hyper-space-1 = 'move-node-to-workspace 1'
hyper-space-2 = 'move-node-to-workspace 2'
hyper-space-3 = 'move-node-to-workspace 3'
hyper-space-4 = 'move-node-to-workspace 4'
hyper-space-5 = 'move-node-to-workspace 5'
hyper-space-6 = 'move-node-to-workspace 6'
hyper-space-7 = 'move-node-to-workspace 7'
hyper-space-8 = 'move-node-to-workspace 8'
hyper-space-9 = 'move-node-to-workspace 9'

# Switch focus between the two last used workspaces
# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
hyper-space = 'workspace-back-and-forth'

# Move workspace to next display
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
hyper-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter service mode
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
hyper-q = [
  'mode service',
  'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=true',
]

# 'service' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]

# Move windows to other nodes
# See: https://nikitabobko.github.io/AeroSpace/commands#join-with
space-left = 'join-with left'
space-down = 'join-with down'
space-up = 'join-with up'
space-right = 'join-with right'

# See: https://nikitabobko.github.io/AeroSpace/commands#resize
# Resize windows
left = 'resize width -50'
down = 'resize height -50'
up = 'resize height +50'
right = 'resize width +50'
shift-down = 'resize smart -50'
shift-up = 'resize smart +50'

# Reset layout
# See: https://nikitabobko.github.io/AeroSpace/commands#flatten-workspace-tree
r = [
  'flatten-workspace-tree',
  'mode main',
  'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]

# Reload config
# See: https://nikitabobko.github.io/AeroSpace/commands#reload-config
c = [
  'reload-config',
  'mode main',
  'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]

# Close all windows on focused workspace
# See: https://nikitabobko.github.io/AeroSpace/commands#close-all-windows-but-current
backspace = [
  'close-all-windows-but-current',
  'mode main',
  'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]
# Back to 'main' mode
# See: https://nikitabobko.github.io/AeroSpace/commands#mode
esc = [
  'mode main',
  'exec-and-forget sketchybar --trigger aerospace_service_mode_enabled_changed AEROSPACE_SERVICE_MODE_ENABLED=false',
]
